{% extends "layout.html" %}
{% block title %}Record Payment{% endblock %}
{% block main %}
  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-dark text-white p-3">
            <h5 class="mb-0">
              <i class="bi bi-cash-stack me-2"></i> Record Community Payment
            </h5>
          </div>
          <div class="card-body p-4">
            <form action="/record_payment" method="POST">
              <div class="mb-3">
                <label class="form-label fw-bold">Select Member</label>
                <select name="user_id" class="form-select" required>
                  <option value="" selected disabled>Choose a member...</option>
                  {% for user in users %}
                    <option value="{{ user.id }}">{{ user.first_name }} {{ user.last_name }} (@{{ user.username }})</option>
                  {% endfor %}
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Amount ($)</label>
                <input type="number"
                       step="0.01"
                       name="amount"
                       class="form-control"
                       placeholder="0.00"
                       required>
                <div class="form-text">Enter positive for payments, negative for charges.</div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Purpose</label>
                <input type="text"
                       name="purpose"
                       class="form-control"
                       placeholder="e.g., Monthly Dues, Hall Rental"
                       required>
              </div>
              <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary fw-bold">Post to Ledger</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
