{% extends "layout.html" %}
{% block title %}Add Events{% endblock %}
{% block main %}
<!-- Add Event Page: A form for users to post new events. It includes fields for event title, description, date, time, and location. The form is styled using Bootstrap and submits the data to the server for processing. -->
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <h2 class="fw-bold mb-4">Post a New Event</h2>
                    <form action="/add_event" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Event Title</label>
                            <input type="text" name="title" class="form-control" placeholder="e.g. Charity Auction" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <textarea name="description" class="form-control" rows="3" placeholder="What is happening?" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Date</label>
                                <input type="date" name="date" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Time</label>
                                <input type="time" name="time" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Location</label>
                            <input type="text" name="location" class="form-control" placeholder="e.g. Main Community Hall" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Publish Event</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
