{% extends "layout.html" %} {% block title %}Login{% endblock %} {% block main%}
<div
  class="container d-flex align-items-center justify-content-center"
  style="min-height: 80vh"
>
<!-- This is the login page for the community manager application. It extends the base layout and provides a form for users to enter their username and password to log in. The form is styled using Bootstrap classes for a clean and responsive design. If the user doesn't have an account, there is a link to the registration page. -->
  <div class="row w-100">
    <div class="col-md-8 col-lg-5 mx-auto">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="card-title text-center mb-4">Login</h3>
          <form action="/login" method="post">
            <div class="row mb-4 align-items-center">
              <label class="col-sm-4 col-form-label text-sm-end text-nowrap"
                >Username</label
              >
              <div class="col-sm-8">
                <input
                  type="text"
                  autocomplete="off"
                  autofocus
                  placeholder="username"
                  name="username"
                  class="form-control"
                  id="username"
                  required
                />
              </div>
            </div>

            <div class="row mb-4 align-items-center">
              <label class="col-sm-4 col-form-label text-sm-end text-nowrap"
                >Password</label
              >
              <div class="col-sm-8">
                <input
                  type="password"
                  autocomplete="off"
                  placeholder="password"
                  name="password"
                  class="form-control"
                  id="password"
                  required
                />
              </div>
            </div>

            <div class="row">
              <div class="col-sm-8 offset-sm-4">
                <button type="submit" class="btn btn-primary w-100">
                  Login
                </button>
              </div>
            </div>

            <div class="text-center mt-3">
              <small class="text-muted"
                >Don't have an account? <a href="/register">Register</a></small
              >
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
